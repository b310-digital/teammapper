<h2 mat-dialog-title>{{ 'MODALS.PICTOGRAMS.TITLE' | translate }}</h2>
<mat-dialog-content>
  <oer-search
    #searchElement
    language="de"
    locked-type="image"
    page-size="20"
    (search-loading)="onSearchLoading()"
    (search-results)="onSearchResults($event)"
    (search-error)="onSearchError($event)"
    (search-cleared)="onSearchCleared()">
    <oer-list
      #listElement
      language="de"
      (card-click)="onCardClick($event)"></oer-list>
    <oer-load-more #loadMoreElement language="de"></oer-load-more>
  </oer-search>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-raised-button [mat-dialog-close]="true">
    {{ 'MODALS.GENERAL.BUTTON_CLOSE' | translate }}
  </button>
</mat-dialog-actions>
