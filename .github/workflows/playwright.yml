name: Playwright Tests
permissions:
  contents: read
  actions: write
on:
  pull_request:
    branches: [main]
jobs:
  test:
    env:
      DB_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD != '' && secrets.CI_POSTGRES_PASSWORD || format('fallback_ci_password_{0}', github.run_number) }}
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          POSTGRES_DB: teammapper-backend-dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: 
          - 5432:5432
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '25'
    - run: corepack enable
    - run: corepack prepare pnpm@9 --activate
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Build packages
      run: pnpm --filter @teammapper/mermaid-mindmap-parser run build
    - name: Cache Playwright browsers
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ hashFiles('pnpm-lock.yaml') }}-webkit
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: pnpm --filter teammapper-frontend exec playwright install webkit --with-deps
    - name: Install Playwright system dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: pnpm --filter teammapper-frontend exec playwright install-deps webkit
    - name: Run Playwright tests
      run: pnpm run migrate:dev && pnpm run test:e2e
      env:
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
        POSTGRES_DATABASE: teammapper-backend-dev
        POSTGRES_SSL: false
        POSTGRES_QUERY_TIMEOUT: 100000
        POSTGRES_STATEMENT_TIMEOUT: 100000
        BINDING: localhost
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: ${{ !cancelled() }}
      with:
        name: playwright
        path: teammapper-frontend/playwright
        retention-days: 7